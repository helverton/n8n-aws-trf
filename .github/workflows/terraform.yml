###############################################################################
# .github/workflows/terraform.yml
#
# SECRETS NECESSARIOS (Settings -> Secrets and variables -> Actions):
#   AWS_ROLE_ARN          -> ARN da role IAM OIDC
#   TF_STATE_BUCKET       -> nome do bucket S3 de state
#   N8N_ENCRYPTION_KEY    -> openssl rand -hex 32
#   CLOUDFLARE_API_TOKEN  -> token Cloudflare com DNS:Edit
#   SLACK_WEBHOOK_URL     -> opcional
###############################################################################

name: "Terraform CI/CD n8n AWS"

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: terraform-prod
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VERSION:  "1.14.8"
  AWS_REGION:  "us-east-1"
  WORKING_DIR: "."

jobs:

  validate:
    name: "Validate"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configurar credenciais AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: terraform init
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=prod/n8n/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="use_lockfile=true" \
            -input=false

      - name: terraform fmt check
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: terraform validate
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform validate

  plan:
    name: "Plan"
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configurar credenciais AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: terraform init
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=prod/n8n/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="use_lockfile=true" \
            -input=false

      - name: terraform plan
        id: plan
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform plan \
            -var="n8n_encryption_key=${{ secrets.N8N_ENCRYPTION_KEY }}" \
            -var="cloudflare_api_token=${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -var="slack_webhook_url=${{ secrets.SLACK_WEBHOOK_URL }}" \
            -var-file="environments/prod/terraform.tfvars" \
            -no-color \
            -out=tfplan 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Comentar plan no PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs      = require('fs');
            const output  = fs.readFileSync('plan_output.txt', 'utf8');
            const maxLen  = 65000;
            const display = output.length > maxLen
              ? output.substring(0, maxLen) + '\n\n... [output truncado]'
              : output;
            const status  = '${{ steps.plan.outcome }}' === 'success'
              ? 'Plan executado com sucesso'
              : 'Plan falhou - revisar erros abaixo';
            const body = `## Terraform Plan\n\n**Status:** ${status}\n\n<details><summary>Resultado</summary>\n\n\`\`\`hcl\n${display}\n\`\`\`\n</details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              body:         body
            });

      - name: Falhar se plan teve erro
        if: steps.plan.outcome == 'failure'
        run: exit 1

  apply:
    name: "Apply"
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configurar credenciais AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: terraform init
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=prod/n8n/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="use_lockfile=true" \
            -input=false

      - name: terraform apply
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform apply \
            -var="n8n_encryption_key=${{ secrets.N8N_ENCRYPTION_KEY }}" \
            -var="cloudflare_api_token=${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -var="slack_webhook_url=${{ secrets.SLACK_WEBHOOK_URL }}" \
            -var-file="environments/prod/terraform.tfvars" \
            -auto-approve \
            -no-color

      - name: Outputs pos-apply
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform output
